<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artifact Sandbox</title>
    <style>
      :root {
        --bg: transparent;
        --fg: #cccccc;
        --border: #3c3c3c;
        --error-bg: #3a1d1d;
        --error-fg: #f48771;
        --error-border: #6e2e2e;
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        font-size: 13px;
        line-height: 1.5;
      }

      #root {
        min-height: 1px;
      }

      #error-display {
        display: none;
        margin: 8px;
        padding: 10px 12px;
        background: var(--error-bg);
        border: 1px solid var(--error-border);
        border-radius: 4px;
        color: var(--error-fg);
        font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      #error-display .error-phase {
        font-weight: 600;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.5px;
        opacity: 0.8;
        margin-bottom: 4px;
      }

      #error-display .error-message {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="error-display">
      <div class="error-phase"></div>
      <pre class="error-message"></pre>
    </div>

    <!-- Tailwind CSS (vendored, zero network) -->
    <script src="/vendor/tailwind-play.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              accent: 'var(--accent, #6366f1)',
              success: 'var(--success, #22c55e)',
              error: 'var(--error, #ef4444)',
              warning: 'var(--warning, #eab308)',
              border: 'var(--border, #3c3c3c)',
              muted: 'var(--fg-muted, #888888)',
              'code-bg': 'var(--code-bg, #1a1a2e)',
            }
          }
        }
      }
    </script>
    <script type="module" src="/src/sandbox-main.ts"></script>
  </body>
</html>
