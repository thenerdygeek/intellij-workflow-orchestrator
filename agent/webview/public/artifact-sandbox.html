<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artifact Sandbox</title>
    <style>
      :root {
        --bg: transparent;
        --fg: #cccccc;
        --border: #3c3c3c;
        --error-bg: #3a1d1d;
        --error-fg: #f48771;
        --error-border: #6e2e2e;
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        font-size: 13px;
        line-height: 1.5;
      }

      #root {
        min-height: 1px;
      }

      #error-display {
        display: none;
        margin: 8px;
        padding: 10px 12px;
        background: var(--error-bg);
        border: 1px solid var(--error-border);
        border-radius: 4px;
        color: var(--error-fg);
        font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      #error-display .error-phase {
        font-weight: 600;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.5px;
        opacity: 0.8;
        margin-bottom: 4px;
      }

      #error-display .error-message {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="error-display">
      <div class="error-phase"></div>
      <pre class="error-message"></pre>
    </div>

    <script type="module">
      import React from 'react'
      import { createRoot } from 'react-dom/client'
      import { Runner } from 'react-runner'

      // ─── State ───────────────────────────────────────────────────────
      let reactRoot = null
      let themeState = { isDark: true, colors: {}, projectName: '' }

      // ─── Parent messaging ───────────────────────────────────────────
      function postToParent(msg) {
        try {
          window.parent.postMessage(msg, '*')
        } catch (_) {
          // Silently ignore if parent is gone
        }
      }

      // ─── Console interception ───────────────────────────────────────
      const originalConsole = {
        log: console.log.bind(console),
        warn: console.warn.bind(console),
        error: console.error.bind(console),
      }

      function interceptConsole(level) {
        console[level] = (...args) => {
          originalConsole[level](...args)
          postToParent({
            type: 'console',
            level,
            args: args.map((a) => {
              try {
                return typeof a === 'string' ? a : JSON.stringify(a)
              } catch {
                return String(a)
              }
            }),
          })
        }
      }

      interceptConsole('log')
      interceptConsole('warn')
      interceptConsole('error')

      // ─── Error display ──────────────────────────────────────────────
      const errorDisplay = document.getElementById('error-display')
      const errorPhaseEl = errorDisplay.querySelector('.error-phase')
      const errorMessageEl = errorDisplay.querySelector('.error-message')

      function showError(phase, message, line) {
        errorPhaseEl.textContent = phase + ' error'
        errorMessageEl.textContent = line != null
          ? `Line ${line}: ${message}`
          : message
        errorDisplay.style.display = 'block'
        postToParent({
          type: 'error',
          phase,
          message,
          ...(line != null && { line }),
        })
      }

      function clearError() {
        errorDisplay.style.display = 'none'
      }

      // ─── Global error handlers ──────────────────────────────────────
      window.addEventListener('error', (event) => {
        showError('runtime', event.message || 'Unknown runtime error')
      })

      window.addEventListener('unhandledrejection', (event) => {
        const msg = event.reason?.message || String(event.reason) || 'Unhandled promise rejection'
        showError('runtime', msg)
      })

      // ─── Bridge object ──────────────────────────────────────────────
      function createBridge() {
        return {
          navigateToFile(path, line) {
            postToParent({
              type: 'bridge',
              action: 'navigateToFile',
              args: [path, line],
            })
          },
          get isDark() { return themeState.isDark },
          get colors() { return { ...themeState.colors } },
          get projectName() { return themeState.projectName },
        }
      }

      // ─── Scope builder ─────────────────────────────────────────────
      function buildScope(userScope) {
        return {
          React,
          useState: React.useState,
          useEffect: React.useEffect,
          useCallback: React.useCallback,
          useMemo: React.useMemo,
          useRef: React.useRef,
          Fragment: React.Fragment,
          bridge: createBridge(),
          ...(userScope || {}),
        }
      }

      // ─── ErrorBoundary ──────────────────────────────────────────────
      class ErrorBoundary extends React.Component {
        constructor(props) {
          super(props)
          this.state = { hasError: false, error: null }
        }

        static getDerivedStateFromError(error) {
          return { hasError: true, error }
        }

        componentDidCatch(error, _errorInfo) {
          showError('render', error.message || 'Component render error')
        }

        render() {
          if (this.state.hasError) {
            return null
          }
          return this.props.children
        }
      }

      // ─── Sandbox app ───────────────────────────────────────────────
      function SandboxApp({ code, scope }) {
        const handleRendered = React.useCallback((error) => {
          if (error) {
            showError('transpile', error.message || 'Transpilation error')
          } else {
            clearError()
            postToParent({
              type: 'rendered',
              height: document.body.scrollHeight,
            })
          }
        }, [])

        if (!code) return null

        return React.createElement(
          ErrorBoundary,
          null,
          React.createElement(Runner, {
            code,
            scope,
            onRendered: handleRendered,
          })
        )
      }

      // ─── Render function ───────────────────────────────────────────
      let currentCode = ''
      let currentScope = {}

      function renderApp(code, scope) {
        currentCode = code
        currentScope = scope
        const rootEl = document.getElementById('root')

        if (!reactRoot) {
          reactRoot = createRoot(rootEl)
        }

        reactRoot.render(
          React.createElement(SandboxApp, {
            code,
            scope: buildScope(scope),
          })
        )
      }

      // ─── Theme application ─────────────────────────────────────────
      function applyTheme(isDark, colors, projectName) {
        themeState = { isDark, colors: colors || {}, projectName: projectName || '' }

        const root = document.documentElement
        if (colors) {
          Object.entries(colors).forEach(([key, value]) => {
            root.style.setProperty(`--${key}`, value)
          })
        }

        // Update error display colors for light/dark
        if (!isDark) {
          root.style.setProperty('--error-bg', '#fde8e8')
          root.style.setProperty('--error-fg', '#c0392b')
          root.style.setProperty('--error-border', '#e6a0a0')
          root.style.setProperty('--fg', '#1e1e1e')
        } else {
          root.style.setProperty('--error-bg', '#3a1d1d')
          root.style.setProperty('--error-fg', '#f48771')
          root.style.setProperty('--error-border', '#6e2e2e')
          root.style.setProperty('--fg', '#cccccc')
        }

        // Re-render if already active (bridge getters read from themeState)
        if (currentCode) {
          renderApp(currentCode, currentScope)
        }
      }

      // ─── ResizeObserver ─────────────────────────────────────────────
      const resizeObserver = new ResizeObserver(() => {
        postToParent({
          type: 'rendered',
          height: document.body.scrollHeight,
        })
      })

      resizeObserver.observe(document.getElementById('root'))

      // ─── Message listener ──────────────────────────────────────────
      window.addEventListener('message', (event) => {
        const msg = event.data
        if (!msg || typeof msg !== 'object' || !msg.type) return

        try {
          switch (msg.type) {
            case 'render':
              clearError()
              renderApp(msg.source || '', msg.scope || {})
              break

            case 'theme':
              applyTheme(
                msg.isDark ?? true,
                msg.colors ?? {},
                msg.projectName ?? ''
              )
              break

            default:
              break
          }
        } catch (err) {
          showError('init', err.message || 'Failed to process message')
        }
      })

      // ─── Ready signal ──────────────────────────────────────────────
      postToParent({ type: 'ready' })
    </script>
  </body>
</html>
