<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* ═══════════════════════════════════════════════════
   CSS Variables — injected from Kotlin on theme change
   ═══════════════════════════════════════════════════ */
:root {
  --bg: #2B2D30;
  --fg: #CBD5E1;
  --fg-secondary: #94A3B8;
  --fg-muted: #6B7280;
  --border: #3F3F46;
  --user-bg: #1E293B;
  --tool-bg: #1A1D23;
  --code-bg: #1E1E2E;
  --thinking-bg: #1F2937;

  --badge-read-bg: #1E3A5F; --badge-read-fg: #60A5FA;
  --badge-write-bg: #14532D; --badge-write-fg: #4ADE80;
  --badge-edit-bg: #451A03; --badge-edit-fg: #FBBF24;
  --badge-cmd-bg: #450A0A; --badge-cmd-fg: #F87171;
  --badge-search-bg: #083344; --badge-search-fg: #22D3EE;

  --accent-read: #3B82F6;
  --accent-write: #22C55E;
  --accent-edit: #F59E0B;
  --accent-cmd: #EF4444;
  --accent-search: #06B6D4;

  --diff-add-bg: #14332A; --diff-add-fg: #86EFAC;
  --diff-rem-bg: #3B1818; --diff-rem-fg: #FCA5A5;

  --success: #22C55E;
  --error: #EF4444;
  --warning: #F59E0B;
  --link: #60A5FA;

  --font-body: -apple-system, 'Segoe UI', system-ui, Roboto, sans-serif;
  --font-mono: 'JetBrains Mono', Menlo, Consolas, 'Courier New', monospace;
}

/* ═══════════════════════════════════════════════════
   Base
   ═══════════════════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--fg);
  background: var(--bg);
  line-height: 1.6;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

#chat-container {
  padding: 16px;
  min-height: 100vh;
}

/* ═══════════════════════════════════════════════════
   Empty State
   ═══════════════════════════════════════════════════ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
  color: var(--fg-muted);
  text-align: center;
}
.empty-state .icon { font-size: 36px; margin-bottom: 16px; opacity: 0.5; }
.empty-state .title { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--fg-secondary); }
.empty-state .desc { font-size: 12px; max-width: 320px; line-height: 1.6; }
.prompts { display: flex; flex-direction: column; gap: 8px; max-width: 420px; margin: 20px auto 0; }
.prompt-btn { padding: 10px 14px; background: var(--tool-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--fg-secondary); font-size: 12px; text-align: left; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
.prompt-btn:hover { border-color: var(--link); color: var(--fg); }

/* ═══════════════════════════════════════════════════
   Messages
   ═══════════════════════════════════════════════════ */
.message { margin-bottom: 16px; animation: fadeIn 0.2s ease-out; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* User message */
.user-msg {
  background: var(--user-bg);
  border-radius: 12px;
  padding: 10px 14px;
  margin-left: 48px;
  position: relative;
}
.user-msg .label {
  font-size: 11px;
  font-weight: 600;
  color: var(--fg-muted);
  margin-bottom: 3px;
  letter-spacing: 0.3px;
}

/* Agent message */
.agent-msg {
  padding: 2px 0;
}
.agent-msg p { margin: 4px 0; }

/* Streaming cursor */
.stream-cursor::after {
  content: '▊';
  color: var(--fg-muted);
  animation: blink 0.8s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ═══════════════════════════════════════════════════
   Tool Call Cards
   ═══════════════════════════════════════════════════ */
.tool-card {
  background: var(--tool-bg);
  border-radius: 8px;
  margin: 10px 0;
  overflow: hidden;
  border-left: 3px solid var(--accent-read);
  transition: border-color 0.2s;
}
.tool-card.type-read { border-left-color: var(--accent-read); }
.tool-card.type-edit { border-left-color: var(--accent-edit); }
.tool-card.type-write { border-left-color: var(--accent-write); }
.tool-card.type-cmd { border-left-color: var(--accent-cmd); }
.tool-card.type-search { border-left-color: var(--accent-search); }

.tool-header {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  gap: 8px;
  cursor: pointer;
}
.tool-header:hover { background: rgba(255,255,255,0.03); }
.tool-header .chevron { font-size: 10px; color: var(--fg-muted); transition: transform 0.2s; flex-shrink: 0; }
.tool-header .chevron.open { transform: rotate(90deg); }

.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 0.5px;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-read { background: var(--badge-read-bg); color: var(--badge-read-fg); }
.badge-write { background: var(--badge-write-bg); color: var(--badge-write-fg); }
.badge-edit { background: var(--badge-edit-bg); color: var(--badge-edit-fg); }
.badge-cmd { background: var(--badge-cmd-bg); color: var(--badge-cmd-fg); }
.badge-search { background: var(--badge-search-bg); color: var(--badge-search-fg); }
.badge-ok { background: var(--badge-write-bg); color: var(--badge-write-fg); }
.badge-fail { background: var(--badge-cmd-bg); color: var(--badge-cmd-fg); }

.tool-target {
  font-size: 12px;
  color: var(--fg);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tool-timing {
  font-size: 11px;
  color: var(--fg-muted);
  font-family: var(--font-mono);
  flex-shrink: 0;
}
.tool-status-icon { font-size: 13px; flex-shrink: 0; }
.tool-status-icon.ok { color: var(--success); }
.tool-status-icon.fail { color: var(--error); }
.tool-status-icon.running { color: var(--fg-muted); animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.tool-detail {
  padding: 0 12px 8px 12px;
  font-size: 12px;
  color: var(--fg-secondary);
  font-family: var(--font-mono);
  word-break: break-all;
  max-height: 120px;
  overflow-y: auto;
}
.tool-detail.collapsed { display: none; }
.tool-result {
  padding: 6px 12px 8px 12px;
  font-size: 12px;
  color: var(--fg-secondary);
  border-top: 1px solid var(--border);
}
.tool-result.collapsed { display: none; }

/* ═══════════════════════════════════════════════════
   Code Blocks
   ═══════════════════════════════════════════════════ */
.code-wrapper {
  position: relative;
  margin: 10px 0;
  border-radius: 8px;
  overflow: hidden;
  background: var(--code-bg);
}
.code-lang {
  font-size: 10px;
  color: var(--fg-muted);
  padding: 6px 12px 0 12px;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.code-block {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 10px 14px;
  overflow-x: auto;
  white-space: pre;
  line-height: 1.5;
  tab-size: 4;
}
.code-copy {
  position: absolute;
  top: 6px;
  right: 6px;
  background: var(--border);
  border: none;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 10px;
  color: var(--fg-muted);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
}
.code-wrapper:hover .code-copy { opacity: 1; }
.code-copy:hover { background: var(--fg-muted); color: var(--bg); }

/* Inline code */
code {
  background: var(--code-bg);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 2px 5px;
  border-radius: 4px;
}

/* ═══════════════════════════════════════════════════
   Diff Cards
   ═══════════════════════════════════════════════════ */
.diff-card {
  border-radius: 8px;
  border: 1px solid var(--border);
  margin: 10px 0;
  overflow: hidden;
}
.diff-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--tool-bg);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.diff-file { font-family: var(--font-mono); font-weight: 600; flex: 1; }
.diff-line {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 1px 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
}
.diff-line .ln { display: inline-block; width: 28px; color: var(--fg-muted); text-align: right; margin-right: 8px; user-select: none; font-size: 11px; }
.diff-add { background: var(--diff-add-bg); color: var(--diff-add-fg); }
.diff-rem { background: var(--diff-rem-bg); color: var(--diff-rem-fg); }

/* ═══════════════════════════════════════════════════
   Thinking Block
   ═══════════════════════════════════════════════════ */
.thinking {
  color: var(--fg-muted);
  font-style: italic;
  font-size: 12px;
  border-left: 2px solid var(--fg-muted);
  padding: 6px 0 6px 12px;
  margin: 8px 0;
  background: var(--thinking-bg);
  border-radius: 0 6px 6px 0;
}

/* ═══════════════════════════════════════════════════
   Status Messages
   ═══════════════════════════════════════════════════ */
.status { font-size: 12px; padding: 4px 0; display: flex; align-items: center; gap: 6px; }
.status-info { color: var(--fg-muted); }
.status-success { color: var(--success); }
.status-warning { color: var(--warning); }
.status-error { color: var(--error); font-weight: 600; }

/* ═══════════════════════════════════════════════════
   Session Footer
   ═══════════════════════════════════════════════════ */
.session-footer {
  margin-top: 20px;
  padding: 14px 0;
  border-top: 1px solid var(--border);
  animation: fadeIn 0.3s ease-out;
}
.footer-status {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.footer-metrics {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--fg-muted);
  display: flex;
  gap: 12px;
  margin-bottom: 6px;
}
.footer-files {
  font-size: 11px;
  color: var(--fg-secondary);
}
.footer-files span { font-family: var(--font-mono); }
.footer-btn { display: inline-block; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--fg-secondary); margin-right: 8px; }
.footer-btn:hover { background: rgba(255,255,255,0.05); }
.footer-btn.undo { color: var(--error); border-color: #5c2020; }
.footer-btn.undo:hover { background: var(--diff-rem-bg); }

/* Plan Card */
.plan-card { background: var(--tool-bg); border: 1px solid var(--border); border-radius: 10px; margin: 12px 0; overflow: hidden; animation: fadeIn 0.3s ease-out; }
.plan-header { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600; }
.plan-header .plan-icon { font-size: 18px; }
.plan-section { padding: 10px 16px; }
.plan-section-title { font-size: 11px; font-weight: 600; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.plan-section-content { font-size: 13px; line-height: 1.5; }
.plan-steps { padding: 4px 16px 10px; }
.plan-step { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.plan-step:last-child { border-bottom: none; }
.plan-step-status { font-size: 16px; flex-shrink: 0; width: 24px; text-align: center; line-height: 1.4; }
.plan-step-content { flex: 1; min-width: 0; }
.plan-step-title { font-size: 13px; font-weight: 500; }
.plan-step-desc { font-size: 12px; color: var(--fg-secondary); margin-top: 2px; }
.plan-step-files { font-size: 11px; color: var(--fg-muted); font-family: var(--font-mono); margin-top: 2px; }
.plan-step-comment-btn { font-size: 12px; cursor: pointer; color: var(--fg-muted); padding: 2px 6px; flex-shrink: 0; border-radius: 4px; }
.plan-step-comment-btn:hover { color: var(--link); background: rgba(59,130,246,0.1); }
.plan-comment-input { width: 100%; padding: 6px 10px; margin-top: 6px; background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--fg); font-size: 12px; font-family: inherit; outline: none; display: none; }
.plan-comment-input.visible { display: block; }
.plan-comment-input:focus { border-color: var(--link); }
.plan-actions { display: flex; gap: 10px; padding: 12px 16px; border-top: 1px solid var(--border); }
.plan-btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; }
.plan-btn.approve { background: var(--success); color: white; }
.plan-btn.approve:hover { opacity: 0.85; }
.plan-btn.revise { background: transparent; border: 1px solid var(--border); color: var(--fg-secondary); }
.plan-btn.revise:hover { border-color: var(--link); color: var(--fg); }

/* Tools Panel Overlay */
.tools-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
.tools-overlay.visible { display: flex; justify-content: center; align-items: center; }
.tools-panel { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; width: 520px; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
.tools-panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.tools-panel-header .title { font-size: 15px; font-weight: 600; }
.tools-panel-header .stats { font-size: 11px; color: var(--fg-muted); font-family: var(--font-mono); }
.tools-panel-header .close-btn { background: none; border: none; color: var(--fg-muted); font-size: 18px; cursor: pointer; padding: 4px; }
.tools-panel-header .close-btn:hover { color: var(--fg); }
.tools-search { padding: 8px 14px; border-bottom: 1px solid var(--border); }
.tools-search input { width: 100%; padding: 7px 10px; background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--fg); font-size: 12px; outline: none; }
.tools-search input:focus { border-color: var(--link); }
.tools-list { overflow-y: auto; flex: 1; }
.tools-category { padding: 8px 18px 4px; font-size: 10px; font-weight: 600; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
.tools-category .cat-dot { width: 7px; height: 7px; border-radius: 50%; }
.tools-category .cat-count { margin-left: auto; font-family: var(--font-mono); }
.tool-row { display: flex; align-items: center; gap: 8px; padding: 5px 18px; cursor: pointer; transition: background 0.1s; }
.tool-row:hover { background: rgba(255,255,255,0.04); }
.tool-row .cb { width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
.tool-row .cb.on { background: var(--link); border-color: var(--link); color: white; }
.tool-row .cb:hover { border-color: var(--link); }
.tool-row .tbadge { font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.3px; min-width: 30px; text-align: center; flex-shrink: 0; }
.tool-row .tname { font-size: 12px; font-family: var(--font-mono); color: var(--fg); min-width: 120px; }
.tool-row .tdesc { font-size: 11px; color: var(--fg-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tool-row .tactive { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; }

/* Tool Detail Overlay */
.tool-detail-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1100; }
.tool-detail-overlay.visible { display: flex; justify-content: center; align-items: center; }
.tool-detail-panel { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; width: 540px; max-height: 80vh; overflow-y: auto; box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
.td-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.td-header .td-name { font-size: 16px; font-weight: 600; font-family: var(--font-mono); }
.td-header .td-close { margin-left: auto; background: none; border: none; color: var(--fg-muted); font-size: 18px; cursor: pointer; }
.td-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 18px; }
.td-tab { padding: 8px 14px; font-size: 12px; color: var(--fg-muted); cursor: pointer; border-bottom: 2px solid transparent; }
.td-tab:hover { color: var(--fg); }
.td-tab.active { color: var(--link); border-bottom-color: var(--link); }
.td-content { padding: 14px 18px; }
.td-section-title { font-size: 10px; font-weight: 600; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.td-param { display: flex; gap: 8px; padding: 4px 0; align-items: baseline; font-size: 12px; }
.td-param .pname { font-family: var(--font-mono); color: var(--fg); min-width: 100px; }
.td-param .ptype { color: var(--link); font-family: var(--font-mono); min-width: 50px; }
.td-param .preq { color: var(--error); font-size: 9px; font-weight: 600; }
.td-param .pdesc { color: var(--fg-muted); flex: 1; }
</style>
</head>
<body>
<div id="chat-container">
  <div class="empty-state" id="empty-state">
    <div class="icon">⚡</div>
    <div class="title">AI Agent</div>
    <div class="desc">Ask me to analyze code, fix bugs, run builds, check quality, or manage tickets.</div>
    <div class="prompts">
      <div class="prompt-btn" onclick="submitPrompt(this.dataset.prompt)" data-prompt="Fix the SonarQube issues in this project">🔍 Fix the SonarQube issues in this project</div>
      <div class="prompt-btn" onclick="submitPrompt(this.dataset.prompt)" data-prompt="Create a PR for my current changes">🔀 Create a PR for my current changes</div>
      <div class="prompt-btn" onclick="submitPrompt(this.dataset.prompt)" data-prompt="What is the status of the latest build?">📋 What is the status of the latest build?</div>
      <div class="prompt-btn" onclick="submitPrompt(this.dataset.prompt)" data-prompt="Run tests and fix any failures">🧪 Run tests and fix any failures</div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   API called from Kotlin via executeJavaScript()
   ═══════════════════════════════════════════════════ */
const container = document.getElementById('chat-container');
const emptyState = document.getElementById('empty-state');
let activeStreamEl = null;

function hideEmpty() {
  if (emptyState) emptyState.style.display = 'none';
}

function scrollToBottom() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function esc(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

/* ── Markdown Rendering ── */

function renderMarkdown(text) {
  var html = esc(text);

  // Code blocks: ```lang\ncode\n```
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
    var langLabel = lang ? '<div class="code-lang">' + lang + '</div>' : '';
    return langLabel + '<div class="code-wrapper"><button class="code-copy">Copy</button><div class="code-block">' + code.trimEnd() + '</div></div>';
  });

  // Inline code: `text`
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold: **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Headers: # text (only at start of line)
  html = html.replace(/^### (.+)$/gm, '<h4 style="margin:8px 0 4px;font-size:13px;">$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3 style="margin:10px 0 4px;font-size:14px;">$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h2 style="margin:12px 0 6px;font-size:15px;">$1</h2>');

  // Lists: - item or * item
  html = html.replace(/^[*-] (.+)$/gm, '<li style="margin-left:16px;list-style:disc;">$1</li>');

  // Newlines to <br> (but not inside code blocks — they use <pre> which handles newlines)
  html = html.replace(/\n/g, '<br>');

  return html;
}

/* ── Session ── */

function startSession(task) {
  hideEmpty();
  container.innerHTML = '';
  appendUserMessage(task);
}

function appendUserMessage(text) {
  hideEmpty();
  endStream();
  const msg = document.createElement('div');
  msg.className = 'message';
  msg.innerHTML = '<div class="user-msg"><div class="label">You</div>' + esc(text) + '</div>';
  container.appendChild(msg);
  activeStreamEl = null;
  scrollToBottom();
}

function completeSession(status, tokensUsed, durationMs, iterations, files) {
  endStream();
  const colors = { SUCCESS: 'var(--success)', FAILED: 'var(--error)', CANCELLED: 'var(--fg-muted)' };
  const icons = { SUCCESS: '✓', FAILED: '✗', CANCELLED: '■' };
  const labels = { SUCCESS: 'Completed', FAILED: 'Failed', CANCELLED: 'Cancelled' };

  const filesHtml = files && files.length > 0
    ? '<div class="footer-files">Files: <span>' + files.map(f => esc(f.split('/').pop())).join(', ') + '</span></div>'
    : '';

  const undoHtml = files && files.length > 0
    ? '<div style="margin-top:10px;"><button class="footer-btn undo" onclick="requestUndo()">↩ Undo All Changes</button><button class="footer-btn" onclick="requestViewTrace()">📋 View Trace</button></div>'
    : '';

  const footer = document.createElement('div');
  footer.className = 'session-footer';
  footer.innerHTML =
    '<div class="footer-status" style="color:' + colors[status] + '">' +
      icons[status] + ' ' + labels[status] +
    '</div>' +
    '<div class="footer-metrics">' +
      '<span>' + tokensUsed.toLocaleString() + ' tokens</span>' +
      '<span>' + formatDuration(durationMs) + '</span>' +
      '<span>' + iterations + ' iterations</span>' +
    '</div>' + filesHtml + undoHtml;
  container.appendChild(footer);
  scrollToBottom();
}

/* ── Streaming ── */

function appendToken(token) {
  hideEmpty();
  if (!activeStreamEl) {
    activeStreamEl = document.createElement('div');
    activeStreamEl.className = 'message';
    const inner = document.createElement('div');
    inner.className = 'agent-msg stream-cursor';
    activeStreamEl._inner = inner;
    activeStreamEl.appendChild(inner);
    container.appendChild(activeStreamEl);
  }
  // Convert markdown-like patterns
  const html = esc(token).replace(/\n/g, '<br>');
  activeStreamEl._inner.insertAdjacentHTML('beforeend', html);
  scrollToBottom();
}

function endStream() {
  if (activeStreamEl && activeStreamEl._inner) {
    activeStreamEl._inner.classList.remove('stream-cursor');
    // Re-render with markdown
    var raw = activeStreamEl._inner.textContent || '';
    activeStreamEl._inner.innerHTML = renderMarkdown(raw);
  }
  activeStreamEl = null;
}

/* ── Tool Calls ── */

function appendToolCall(toolName, args, statusStr) {
  endStream(); hideEmpty();
  const type = toolType(toolName);
  const badge = badgeFor(type);
  const target = extractTarget(toolName, args);
  const statusIcon = statusStr === 'SUCCESS' ? '<span class="tool-status-icon ok">✓</span>'
    : statusStr === 'FAILED' ? '<span class="tool-status-icon fail">✗</span>'
    : '<span class="tool-status-icon running">◌</span>';

  const argsHtml = args && args.length > 2
    ? '<div class="tool-detail collapsed">' + esc(args.substring(0, 300)) + '</div>' : '';

  const card = document.createElement('div');
  card.className = 'message';
  card.innerHTML =
    '<div class="tool-card type-' + type + '" id="tool-' + Date.now() + '">' +
      '<div class="tool-header">' +
        '<span class="chevron">▶</span>' +
        badge + '<span class="tool-target">' + esc(target) + '</span>' +
        statusIcon +
      '</div>' + argsHtml +
    '</div>';
  container.appendChild(card);
  scrollToBottom();
}

function updateToolResult(result, durationMs) {
  // Append result to the last tool card
  const cards = container.querySelectorAll('.tool-card');
  const last = cards[cards.length - 1];
  if (!last) return;
  if (result) {
    const res = document.createElement('div');
    res.className = 'tool-result collapsed';
    res.textContent = result.substring(0, 300);
    last.appendChild(res);
  }
  if (durationMs > 0) {
    const header = last.querySelector('.tool-header');
    if (header) {
      const timing = document.createElement('span');
      timing.className = 'tool-timing';
      timing.textContent = formatDuration(durationMs);
      header.appendChild(timing);
    }
  }
  scrollToBottom();
}

/* ── Diffs ── */

function appendDiff(filePath, oldLines, newLines, accepted) {
  endStream(); hideEmpty();
  const fileName = filePath.split('/').pop();
  let statusBadge = '';
  if (accepted === true) statusBadge = '<span class="badge badge-ok">APPLIED</span>';
  else if (accepted === false) statusBadge = '<span class="badge badge-fail">REJECTED</span>';

  let diffHtml = '';
  oldLines.forEach((l, i) => { diffHtml += '<div class="diff-line diff-rem"><span class="ln">' + (i+1) + '</span>- ' + esc(l) + '</div>'; });
  newLines.forEach((l, i) => { diffHtml += '<div class="diff-line diff-add"><span class="ln">' + (i+1) + '</span>+ ' + esc(l) + '</div>'; });

  const card = document.createElement('div');
  card.className = 'message';
  card.innerHTML =
    '<div class="diff-card">' +
      '<div class="diff-card-header">' +
        '<span class="badge badge-edit">EDIT</span>' +
        '<span class="diff-file">' + esc(fileName) + '</span>' +
        statusBadge +
      '</div>' + diffHtml +
    '</div>';
  container.appendChild(card);
  scrollToBottom();
}

/* ── Status / Error / Thinking ── */

function appendStatus(message, type) {
  endStream(); hideEmpty();
  const icons = { INFO: 'ℹ', SUCCESS: '✓', WARNING: '⚠', ERROR: '✗' };
  const el = document.createElement('div');
  el.className = 'message';
  el.innerHTML = '<div class="status status-' + type.toLowerCase() + '">' +
    '<span>' + (icons[type] || '') + '</span>' + esc(message) + '</div>';
  container.appendChild(el);
  scrollToBottom();
}

function appendThinking(text) {
  endStream(); hideEmpty();
  const el = document.createElement('div');
  el.className = 'message';
  el.innerHTML = '<div class="thinking">' + esc(text) + '</div>';
  container.appendChild(el);
  scrollToBottom();
}

function clearChat() {
  container.innerHTML = '';
  if (emptyState) { container.appendChild(emptyState); emptyState.style.display = ''; }
  activeStreamEl = null;
}

/* ── Theme ── */

function applyTheme(vars) {
  const root = document.documentElement;
  for (const [key, value] of Object.entries(vars)) {
    root.style.setProperty('--' + key, value);
  }
}

/* ── Helpers ── */

function toolType(name) {
  if (/read|find|structure|hierarchy|references|diagnostics|spring|jira_get|bamboo|sonar/.test(name)) return 'read';
  if (/edit/.test(name)) return 'edit';
  if (/write|create|bitbucket/.test(name)) return 'write';
  if (/command|run/.test(name)) return 'cmd';
  if (/search/.test(name)) return 'search';
  return 'read';
}

function badgeFor(type) {
  const labels = { read: 'READ', edit: 'EDIT', write: 'WRITE', cmd: 'CMD', search: 'SEARCH' };
  return '<span class="badge badge-' + type + '">' + (labels[type] || 'TOOL') + '</span>';
}

function extractTarget(toolName, args) {
  const pathMatch = args && args.match(/"path"\s*:\s*"([^"]+)"/);
  if (pathMatch) return pathMatch[1].split('/').pop();
  const queryMatch = args && args.match(/"query"\s*:\s*"([^"]+)"/);
  if (queryMatch) return '"' + queryMatch[1].substring(0, 40) + '"';
  return toolName.replace(/_/g, ' ');
}

function formatDuration(ms) {
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  return Math.floor(ms / 60000) + 'm ' + Math.floor((ms % 60000) / 1000) + 's';
}

function submitPrompt(text) {
  // Will be wired to Kotlin via JBCefJSQuery
  if (window._submitPrompt) {
    window._submitPrompt(text);
  }
}

function requestUndo() {
  if (window._requestUndo) window._requestUndo();
}

function requestViewTrace() {
  if (window._requestViewTrace) window._requestViewTrace();
}

// Copy button handler
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('code-copy')) {
    var codeEl = e.target.closest('.code-wrapper').querySelector('.code-block');
    if (codeEl) {
      navigator.clipboard.writeText(codeEl.textContent).then(function() {
        e.target.textContent = 'Copied!';
        setTimeout(function() { e.target.textContent = 'Copy'; }, 2000);
      });
    }
  }
});

/* ── Plan Card ── */

function renderPlan(planJson) {
  endStream(); hideEmpty();
  var plan;
  try { plan = typeof planJson === 'string' ? JSON.parse(planJson) : planJson; } catch(e) { return; }

  var stepsHtml = '';
  plan.steps.forEach(function(step) {
    var statusIcon = step.status === 'done' ? '✓' : step.status === 'running' ? '◉' : step.status === 'failed' ? '✗' : '○';
    var statusColor = step.status === 'done' ? 'var(--success)' : step.status === 'running' ? 'var(--link)' : step.status === 'failed' ? 'var(--error)' : 'var(--fg-muted)';
    var filesHtml = step.files && step.files.length > 0 ? '<div class="plan-step-files">' + step.files.map(function(f) { return esc(f); }).join(', ') + '</div>' : '';
    var descHtml = step.description ? '<div class="plan-step-desc">' + esc(step.description) + '</div>' : '';

    stepsHtml += '<div class="plan-step" data-step-id="' + esc(step.id) + '">'
      + '<div class="plan-step-status" style="color:' + statusColor + '">' + statusIcon + '</div>'
      + '<div class="plan-step-content">'
      + '<div class="plan-step-title">' + esc(step.id) + '. ' + esc(step.title) + '</div>'
      + descHtml + filesHtml
      + '<input class="plan-comment-input" data-step-id="' + esc(step.id) + '" placeholder="Add feedback for this step...">'
      + '</div>'
      + '<div class="plan-step-comment-btn" onclick="togglePlanComment(this)">💬</div>'
      + '</div>';
  });

  var approachHtml = plan.approach ? '<div class="plan-section"><div class="plan-section-title">Approach</div><div class="plan-section-content">' + esc(plan.approach) + '</div></div>' : '';
  var testingHtml = plan.testing ? '<div class="plan-section"><div class="plan-section-title">Testing</div><div class="plan-section-content">' + esc(plan.testing) + '</div></div>' : '';

  var card = document.createElement('div');
  card.className = 'message';
  card.innerHTML = '<div class="plan-card" id="active-plan">'
    + '<div class="plan-header"><span class="plan-icon">📋</span> Implementation Plan</div>'
    + '<div class="plan-section"><div class="plan-section-title">Goal</div><div class="plan-section-content">' + esc(plan.goal) + '</div></div>'
    + approachHtml
    + '<div class="plan-steps"><div class="plan-section-title">Steps (' + plan.steps.length + ')</div>' + stepsHtml + '</div>'
    + testingHtml
    + '<div class="plan-actions">'
    + '<button class="plan-btn approve" onclick="approvePlanAction()">✓ Approve &amp; Execute</button>'
    + '<button class="plan-btn revise" onclick="revisePlanAction()">✏ Revise with Comments</button>'
    + '</div>'
    + '</div>';
  container.appendChild(card);
  scrollToBottom();
}

function updatePlanStep(stepId, status) {
  var steps = document.querySelectorAll('.plan-step[data-step-id="' + stepId + '"]');
  steps.forEach(function(step) {
    var icon = step.querySelector('.plan-step-status');
    if (icon) {
      if (status === 'done') { icon.textContent = '✓'; icon.style.color = 'var(--success)'; }
      else if (status === 'running') { icon.textContent = '◉'; icon.style.color = 'var(--link)'; }
      else if (status === 'failed') { icon.textContent = '✗'; icon.style.color = 'var(--error)'; }
    }
  });
}

function togglePlanComment(btn) {
  var step = btn.closest('.plan-step');
  if (step) {
    var input = step.querySelector('.plan-comment-input');
    if (input) {
      input.classList.toggle('visible');
      if (input.classList.contains('visible')) input.focus();
    }
  }
}

function approvePlanAction() {
  // Disable buttons
  var actions = document.querySelector('.plan-actions');
  if (actions) actions.innerHTML = '<div style="color:var(--success);font-size:13px;padding:4px;">✓ Plan approved — executing...</div>';
  // Call Kotlin
  if (window._approvePlan) window._approvePlan();
}

function revisePlanAction() {
  var comments = {};
  document.querySelectorAll('.plan-comment-input').forEach(function(input) {
    var val = input.value.trim();
    if (val) comments[input.dataset.stepId] = val;
  });
  if (Object.keys(comments).length === 0) {
    alert('Add at least one comment to a step before requesting revision.');
    return;
  }
  // Remove the plan card (agent will regenerate)
  var planCard = document.getElementById('active-plan');
  if (planCard) planCard.parentElement.remove();
  // Call Kotlin with comments JSON
  if (window._revisePlan) window._revisePlan(JSON.stringify(comments));
}

// Collapsible tool details handler
document.addEventListener('click', function(e) {
  var header = e.target.closest('.tool-header');
  if (header) {
    var card = header.closest('.tool-card');
    if (card) {
      var details = card.querySelectorAll('.tool-detail, .tool-result');
      var chevron = header.querySelector('.chevron');
      details.forEach(function(d) { d.classList.toggle('collapsed'); });
      if (chevron) chevron.classList.toggle('open');
    }
  }
});

/* ── Tools Panel ── */

var _toolsData = null;

function showToolsPanel(toolsJson) {
  _toolsData = typeof toolsJson === 'string' ? JSON.parse(toolsJson) : toolsJson;
  var overlay = document.getElementById('tools-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'tools-overlay';
    overlay.className = 'tools-overlay';
    overlay.onclick = function(e) { if (e.target === overlay) closeToolsPanel(); };
    document.body.appendChild(overlay);
  }
  renderToolsList(_toolsData, '');
  overlay.classList.add('visible');
}

function closeToolsPanel() {
  var overlay = document.getElementById('tools-overlay');
  if (overlay) overlay.classList.remove('visible');
}

function renderToolsList(data, filter) {
  var overlay = document.getElementById('tools-overlay');
  var enabledCount = 0;
  var totalCount = 0;

  var html = '<div class="tools-panel">';
  html += '<div class="tools-panel-header"><span class="title">Agent Tools</span><span class="stats" id="tools-stats"></span><button class="close-btn" onclick="closeToolsPanel()">x</button></div>';
  html += '<div class="tools-search"><input id="tools-filter" placeholder="Search tools..." oninput="filterTools(this.value)" value="' + esc(filter) + '"/></div>';
  html += '<div class="tools-list">';

  data.categories.forEach(function(cat) {
    var visibleTools = cat.tools.filter(function(t) {
      return !filter || t.name.includes(filter.toLowerCase()) || t.description.toLowerCase().includes(filter.toLowerCase());
    });
    if (visibleTools.length === 0) return;
    totalCount += visibleTools.length;

    html += '<div class="tools-category"><span class="cat-dot" style="background:' + cat.color + '"></span>' + esc(cat.displayName) + '<span class="cat-count">' + visibleTools.length + '</span></div>';

    visibleTools.forEach(function(tool) {
      var checked = tool.enabled;
      if (checked) enabledCount++;
      var badgeStyle = 'background:' + cat.color + '20;color:' + cat.color;
      var activeHtml = tool.active ? '<span class="tactive"></span>' : '';

      html += '<div class="tool-row" onclick="showToolDetail(\'' + esc(tool.name) + '\')">';
      html += '<div class="cb ' + (checked ? 'on' : '') + '" onclick="event.stopPropagation();toggleTool(\'' + esc(tool.name) + '\',' + !checked + ')">' + (checked ? '&#10003;' : '') + '</div>';
      html += '<span class="tbadge" style="' + badgeStyle + '">' + esc(cat.badgePrefix || tool.badge || '') + '</span>';
      html += '<span class="tname">' + esc(tool.name) + '</span>';
      html += '<span class="tdesc">' + esc(tool.description) + '</span>';
      html += activeHtml;
      html += '</div>';
    });
  });

  html += '</div></div>';
  overlay.innerHTML = html;
  document.getElementById('tools-stats').textContent = enabledCount + ' enabled / ' + totalCount + ' total';
}

function filterTools(query) {
  if (_toolsData) renderToolsList(_toolsData, query);
}

function toggleTool(name, enabled) {
  if (_toolsData) {
    _toolsData.categories.forEach(function(cat) {
      cat.tools.forEach(function(t) { if (t.name === name) t.enabled = enabled; });
    });
    renderToolsList(_toolsData, document.getElementById('tools-filter') ? document.getElementById('tools-filter').value : '');
  }
  if (window._toggleTool) window._toggleTool(name + ':' + (enabled ? '1' : '0'));
}

/* ── Tool Detail ── */

function showToolDetail(toolName) {
  var tool = null;
  var toolCatColor = null;
  var toolBadge = null;
  if (_toolsData) {
    _toolsData.categories.forEach(function(cat) {
      cat.tools.forEach(function(t) {
        if (t.name === toolName) {
          tool = t;
          toolCatColor = cat.color;
          toolBadge = cat.badgePrefix || t.badge || '';
        }
      });
    });
  }
  if (!tool) return;

  var overlay = document.getElementById('tool-detail-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'tool-detail-overlay';
    overlay.className = 'tool-detail-overlay';
    overlay.onclick = function(e) { if (e.target === overlay) closeToolDetail(); };
    document.body.appendChild(overlay);
  }

  var paramsHtml = (tool.parameters || []).map(function(p) {
    return '<div class="td-param"><span class="pname">' + esc(p.name) + '</span><span class="ptype">' + esc(p.type) + '</span>' +
      (p.required ? '<span class="preq">REQUIRED</span>' : '') +
      '<span class="pdesc">' + esc(p.description) + '</span></div>';
  }).join('');

  var schemaHtml = tool.schema ? '<div class="code-wrapper"><button class="code-copy" style="opacity:1">Copy</button><div class="code-block">' + esc(tool.schema) + '</div></div>' : '';

  var exampleHtml = '';
  if (tool.exampleRequest) {
    exampleHtml = '<div style="font-size:11px;color:var(--fg-muted);margin-bottom:4px;">LLM sends:</div>' +
      '<div class="code-wrapper"><div class="code-block">' + esc(tool.exampleRequest) + '</div></div>' +
      '<div style="font-size:11px;color:var(--fg-muted);margin:8px 0 4px;">Agent returns:</div>' +
      '<div class="code-wrapper"><div class="code-block">' + esc(tool.exampleResponse || 'Success message') + '</div></div>';
  }

  var badgeColor = tool.categoryColor || toolCatColor || 'var(--border)';
  var badgeFg = tool.categoryColor || toolCatColor || 'var(--fg-muted)';

  overlay.innerHTML = '<div class="tool-detail-panel">' +
    '<div class="td-header"><span class="tbadge" style="background:' + badgeColor + '20;color:' + badgeFg + ';font-size:11px;padding:2px 8px;">' + esc(toolBadge) + '</span>' +
    '<span class="td-name">' + esc(tool.name) + '</span>' +
    '<button class="td-close" onclick="closeToolDetail()">x</button></div>' +
    '<div class="td-tabs"><div class="td-tab active" onclick="switchDetailTab(this,0)">Description</div><div class="td-tab" onclick="switchDetailTab(this,1)">Parameters</div><div class="td-tab" onclick="switchDetailTab(this,2)">JSON Schema</div><div class="td-tab" onclick="switchDetailTab(this,3)">Example</div></div>' +
    '<div class="td-content" id="td-content-area">' +
    '<div class="td-section-title">Description</div><div style="font-size:13px;line-height:1.6;color:var(--fg-secondary);">' + esc(tool.description) + '</div>' +
    '</div></div>';

  // Store tab content for switching
  overlay._tabContent = [
    '<div class="td-section-title">Description</div><div style="font-size:13px;line-height:1.6;color:var(--fg-secondary);">' + esc(tool.description) + '</div>',
    '<div class="td-section-title">Parameters</div>' + (paramsHtml || '<div style="color:var(--fg-muted);font-size:12px;">No parameters</div>'),
    '<div class="td-section-title">JSON Schema (sent to LLM)</div>' + schemaHtml,
    '<div class="td-section-title">Example Request / Response</div>' + (exampleHtml || '<div style="color:var(--fg-muted);font-size:12px;">No example available</div>')
  ];

  overlay.classList.add('visible');
}

function closeToolDetail() {
  var overlay = document.getElementById('tool-detail-overlay');
  if (overlay) overlay.classList.remove('visible');
}

function switchDetailTab(tabEl, index) {
  var tabs = tabEl.parentElement.querySelectorAll('.td-tab');
  tabs.forEach(function(t) { t.classList.remove('active'); });
  tabEl.classList.add('active');
  var overlay = document.getElementById('tool-detail-overlay');
  var content = document.getElementById('td-content-area');
  if (overlay && overlay._tabContent && content) {
    content.innerHTML = overlay._tabContent[index] || '';
  }
}
</script>
