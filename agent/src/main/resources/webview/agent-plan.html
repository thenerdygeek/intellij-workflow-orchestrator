<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Implementation Plan</title>
<style>
    :root {
        --bg: #1e1e2e;
        --fg: #cdd6f4;
        --border: #313244;
        --tool-bg: #181825;
        --link: #89b4fa;
        --success: #a6e3a1;
        --error: #f38ba8;
        --fg-muted: #6c7086;
        --fg-secondary: #a6adc8;
        --code-bg: #11111b;
        --font-mono: 'JetBrains Mono', monospace;
        --warning: #f9e2af;
        --running: #89b4fa;
        --pending: #6c7086;
        --accent: #cba6f7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.6;
        padding: 24px;
        min-height: 100vh;
    }

    .plan-container {
        max-width: 900px;
        margin: 0 auto;
    }

    .plan-header {
        margin-bottom: 32px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
    }

    .plan-header h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 12px;
        color: var(--fg);
    }

    .plan-goal {
        font-size: 15px;
        color: var(--fg-secondary);
        margin-bottom: 12px;
    }

    .plan-approach {
        font-size: 13px;
        color: var(--fg-muted);
        background: var(--tool-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px 16px;
        line-height: 1.5;
    }

    .plan-testing {
        font-size: 13px;
        color: var(--fg-muted);
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px 16px;
        margin-top: 12px;
        line-height: 1.5;
    }

    .plan-testing-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--fg-muted);
        margin-bottom: 4px;
    }

    .steps-section {
        margin-bottom: 32px;
    }

    .steps-section h2 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 16px;
        color: var(--fg-secondary);
    }

    .step-card {
        background: var(--tool-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 12px;
        transition: border-color 0.2s;
    }

    .step-card:hover {
        border-color: var(--fg-muted);
    }

    .step-card.status-completed {
        border-left: 3px solid var(--success);
    }

    .step-card.status-running {
        border-left: 3px solid var(--running);
    }

    .step-card.status-failed {
        border-left: 3px solid var(--error);
    }

    .step-card.status-pending {
        border-left: 3px solid var(--pending);
    }

    .step-header {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 10px;
    }

    .step-status-icon {
        font-size: 18px;
        flex-shrink: 0;
        width: 24px;
        text-align: center;
        line-height: 24px;
    }

    .step-status-icon.pending { color: var(--pending); }
    .step-status-icon.running { color: var(--running); }
    .step-status-icon.completed { color: var(--success); }
    .step-status-icon.failed { color: var(--error); }

    .step-title-area {
        flex: 1;
    }

    .step-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--fg);
    }

    .step-id {
        font-size: 11px;
        color: var(--fg-muted);
        font-family: var(--font-mono);
    }

    .step-description {
        font-size: 13px;
        color: var(--fg-secondary);
        margin-left: 36px;
        margin-bottom: 10px;
        line-height: 1.5;
    }

    .step-files {
        margin-left: 36px;
        margin-bottom: 12px;
    }

    .step-files-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--fg-muted);
        margin-bottom: 4px;
    }

    .file-link {
        display: inline-block;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--link);
        cursor: pointer;
        padding: 2px 8px;
        margin: 2px 4px 2px 0;
        background: var(--code-bg);
        border-radius: 4px;
        border: 1px solid var(--border);
        text-decoration: none;
        transition: background 0.15s, border-color 0.15s;
    }

    .file-link:hover {
        background: var(--border);
        border-color: var(--link);
    }

    .step-comment {
        margin-left: 36px;
    }

    .step-comment label {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--fg-muted);
        margin-bottom: 4px;
    }

    .step-comment textarea {
        width: 100%;
        min-height: 60px;
        background: var(--code-bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        resize: vertical;
        outline: none;
        transition: border-color 0.2s;
    }

    .step-comment textarea:focus {
        border-color: var(--link);
    }

    .step-comment textarea::placeholder {
        color: var(--fg-muted);
    }

    .actions-bar {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        padding-top: 20px;
        border-top: 1px solid var(--border);
    }

    .btn {
        padding: 10px 24px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid var(--border);
        transition: background 0.15s, border-color 0.15s;
    }

    .btn-approve {
        background: var(--success);
        color: var(--code-bg);
        border-color: var(--success);
    }

    .btn-approve:hover {
        opacity: 0.9;
    }

    .btn-revise {
        background: var(--tool-bg);
        color: var(--warning);
        border-color: var(--warning);
    }

    .btn-revise:hover {
        background: var(--border);
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--fg-muted);
        font-size: 14px;
    }
</style>
</head>
<body>
<div class="plan-container" id="planRoot">
    <div class="empty-state">Loading plan...</div>
</div>

<script>
    var _planData = null;

    function statusIcon(status) {
        switch (status) {
            case 'completed': return '<span class="step-status-icon completed">&#10003;</span>';
            case 'running':   return '<span class="step-status-icon running">&#9673;</span>';
            case 'failed':    return '<span class="step-status-icon failed">&#10007;</span>';
            default:          return '<span class="step-status-icon pending">&#9675;</span>';
        }
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function renderPlan(planJsonStr) {
        try {
            _planData = JSON.parse(planJsonStr);
        } catch (e) {
            document.getElementById('planRoot').innerHTML =
                '<div class="empty-state">Failed to parse plan data.</div>';
            return;
        }

        var plan = _planData;
        var html = '';

        // Header
        html += '<div class="plan-header">';
        html += '<h1>Implementation Plan</h1>';
        html += '<div class="plan-goal">' + escapeHtml(plan.goal) + '</div>';
        if (plan.approach) {
            html += '<div class="plan-approach">' + escapeHtml(plan.approach) + '</div>';
        }
        if (plan.testing) {
            html += '<div class="plan-testing">';
            html += '<div class="plan-testing-label">Testing Strategy</div>';
            html += escapeHtml(plan.testing);
            html += '</div>';
        }
        html += '</div>';

        // Steps
        html += '<div class="steps-section">';
        html += '<h2>Steps (' + plan.steps.length + ')</h2>';

        for (var i = 0; i < plan.steps.length; i++) {
            var step = plan.steps[i];
            var statusClass = 'status-' + (step.status || 'pending');

            html += '<div class="step-card ' + statusClass + '" id="step-' + escapeHtml(step.id) + '">';

            // Header row
            html += '<div class="step-header">';
            html += statusIcon(step.status || 'pending');
            html += '<div class="step-title-area">';
            html += '<div class="step-title">' + escapeHtml(step.title) + '</div>';
            html += '<div class="step-id">' + escapeHtml(step.id) + '</div>';
            html += '</div>';
            html += '</div>';

            // Description
            if (step.description) {
                html += '<div class="step-description">' + escapeHtml(step.description) + '</div>';
            }

            // Files
            if (step.files && step.files.length > 0) {
                html += '<div class="step-files">';
                html += '<div class="step-files-label">Files</div>';
                for (var j = 0; j < step.files.length; j++) {
                    var filePath = step.files[j];
                    html += '<span class="file-link" onclick="window._openFile(\'' +
                        filePath.replace(/'/g, "\\'") + '\')">' +
                        escapeHtml(filePath) + '</span>';
                }
                html += '</div>';
            }

            // Comment textarea
            html += '<div class="step-comment">';
            html += '<label for="comment-' + escapeHtml(step.id) + '">Revision Comment</label>';
            html += '<textarea id="comment-' + escapeHtml(step.id) + '" ' +
                'data-step-id="' + escapeHtml(step.id) + '" ' +
                'placeholder="Add feedback for this step...">' +
                escapeHtml(step.userComment || '') + '</textarea>';
            html += '</div>';

            html += '</div>';
        }

        html += '</div>';

        // Action buttons
        html += '<div class="actions-bar">';
        html += '<button class="btn btn-revise" onclick="handleRevise()">Request Revision</button>';
        html += '<button class="btn btn-approve" onclick="handleApprove()">Approve Plan</button>';
        html += '</div>';

        document.getElementById('planRoot').innerHTML = html;
    }

    function updatePlanStep(stepId, status) {
        var card = document.getElementById('step-' + stepId);
        if (!card) return;

        // Update class
        card.className = 'step-card status-' + status;

        // Update icon
        var iconEl = card.querySelector('.step-status-icon');
        if (iconEl) {
            iconEl.outerHTML = statusIcon(status);
        }

        // Update internal data
        if (_planData && _planData.steps) {
            for (var i = 0; i < _planData.steps.length; i++) {
                if (_planData.steps[i].id === stepId) {
                    _planData.steps[i].status = status;
                    break;
                }
            }
        }
    }

    function handleApprove() {
        if (window._approvePlan) {
            window._approvePlan();
        }
    }

    function handleRevise() {
        var comments = {};
        var textareas = document.querySelectorAll('.step-comment textarea');
        for (var i = 0; i < textareas.length; i++) {
            var ta = textareas[i];
            var val = ta.value.trim();
            if (val) {
                comments[ta.getAttribute('data-step-id')] = val;
            }
        }
        if (window._revisePlan) {
            window._revisePlan(JSON.stringify(comments));
        }
    }
</script>
</body>
</html>
