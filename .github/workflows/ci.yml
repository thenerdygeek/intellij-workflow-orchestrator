name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-verify:
    name: Build & Verify Plugin
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # --no-configuration-cache on CI: the Kotlin plugin's classpath snapshot isn't always
      # config-cache serializable, and an ephemeral runner has no warm cache to reuse anyway.
      # Config cache stays ON locally (gradle.properties) where it pays off.
      - name: Build
        run: ./gradlew --no-daemon --no-configuration-cache -Dorg.gradle.java.home="$JAVA_HOME" assemble

      - name: Verify plugin
        run: ./gradlew --no-daemon --no-configuration-cache -Dorg.gradle.java.home="$JAVA_HOME" verifyPlugin

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests (capped workers to avoid OOM)
        run: >-
          ./gradlew --no-daemon --no-configuration-cache
          -Dorg.gradle.java.home="$JAVA_HOME"
          -Dorg.gradle.workers.max=2 --max-workers=2
          test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/**"
          if-no-files-found: ignore

  lint:
    name: Static analysis (detekt)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run detekt
        run: ./gradlew --no-daemon -Dorg.gradle.java.home="$JAVA_HOME" detekt
      - name: Upload detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: "**/build/reports/detekt/**"
          if-no-files-found: ignore

  arch:
    name: Architecture tests (Konsist)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run architecture tests
        run: ./gradlew --no-daemon -Dorg.gradle.java.home="$JAVA_HOME" :konsist:test
      - name: Upload architecture test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: konsist-reports
          path: "konsist/build/reports/tests/**"
          if-no-files-found: ignore
