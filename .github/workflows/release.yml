# Release workflow — triggered on version tags (v*).
#
# Required GitHub secrets:
#   CERTIFICATE_CHAIN   — PEM certificate chain for plugin signing
#   PRIVATE_KEY         — PEM private key for plugin signing
#   PRIVATE_KEY_PASSWORD — Passphrase for the private key (may be empty string)
#   PUBLISH_TOKEN       — JetBrains Marketplace publish token (used when uploading; not wired here yet)
#
# The signPlugin step is gated on CERTIFICATE_CHAIN being non-empty so that
# fork/branch builds with no secrets set skip signing cleanly.
#
# Live end-to-end run requires: the four secrets above set in repo settings + a tag push.
# Cannot be verified in a secrets-absent environment (the signing step will be skipped).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    name: Build, Sign & Release Plugin
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # id-token: write is needed for actions/attest-build-provenance (OIDC)
    # contents: write is needed for softprops/action-gh-release to create/update releases
    # attestations: write is needed for actions/attest-build-provenance to store attestations
    permissions:
      contents: write
      id-token: write
      attestations: write

    # Map secrets to env vars so the if: condition below can read them.
    # GitHub Actions does not allow reading secrets directly in if: expressions.
    env:
      CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      # Sign the plugin — skipped when CERTIFICATE_CHAIN secret is absent (forks, draft runs).
      - name: Sign plugin
        if: ${{ env.CERTIFICATE_CHAIN != '' }}
        run: ./gradlew --no-daemon --no-configuration-cache -Dorg.gradle.java.home="$JAVA_HOME" signPlugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}

      - name: Build plugin
        run: ./gradlew --no-daemon --no-configuration-cache -Dorg.gradle.java.home="$JAVA_HOME" buildPlugin

      # Generate the CycloneDX SBOM (C5). cyclonedxBom is provided by the org.cyclonedx.bom
      # plugin in the root build.gradle.kts and aggregates every submodule's dependencies into
      # build/reports/cyclonedx/bom.json. --no-configuration-cache: the task is not CC-compatible.
      - name: Generate SBOM
        run: ./gradlew --no-daemon --no-configuration-cache -Dorg.gradle.java.home="$JAVA_HOME" cyclonedxBom

      # Attest build provenance for the signed ZIP artifact.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: build/distributions/*.zip

      # Create or update the GitHub release and attach the plugin ZIP + SBOM.
      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            build/distributions/*.zip
            build/reports/cyclonedx/bom.json
          generate_release_notes: true
