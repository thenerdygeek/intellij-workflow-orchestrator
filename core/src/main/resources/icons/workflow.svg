<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13">
  <!-- Background: rounded square with gradient feel -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="11" height="11" x="1" y="1" rx="2.5" fill="url(#bg)"/>

  <!-- Flow arrows: 3 connected nodes representing workflow -->
  <!-- Top node (green - sprint/start) -->
  <circle cx="3.5" cy="3.5" r="1.3" fill="#34D399"/>
  <!-- Middle node (amber - build/progress) -->
  <circle cx="6.5" cy="6.5" r="1.3" fill="#FBBF24"/>
  <!-- Bottom-right node (cyan - complete/handover) -->
  <circle cx="9.5" cy="9.5" r="1.3" fill="#22D3EE"/>

  <!-- Connecting flow lines -->
  <line x1="4.6" y1="4.2" x2="5.6" y2="5.5" stroke="#FFFFFF" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="7.6" y1="7.2" x2="8.6" y2="8.5" stroke="#FFFFFF" stroke-width="0.8" stroke-linecap="round"/>
</svg>
