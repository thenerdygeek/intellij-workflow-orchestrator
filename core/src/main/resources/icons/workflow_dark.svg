<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13">
  <!-- Background: brighter gradient for dark theme visibility -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <rect width="11" height="11" x="1" y="1" rx="2.5" fill="url(#bg)"/>

  <!-- Flow nodes - brighter for dark theme -->
  <circle cx="3.5" cy="3.5" r="1.3" fill="#6EE7B7"/>
  <circle cx="6.5" cy="6.5" r="1.3" fill="#FCD34D"/>
  <circle cx="9.5" cy="9.5" r="1.3" fill="#67E8F9"/>

  <!-- Connecting flow lines -->
  <line x1="4.6" y1="4.2" x2="5.6" y2="5.5" stroke="#FFFFFF" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="7.6" y1="7.2" x2="8.6" y2="8.5" stroke="#FFFFFF" stroke-width="0.8" stroke-linecap="round"/>
</svg>
